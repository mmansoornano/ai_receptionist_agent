[pytest]
testpaths = tests
pythonpath = .
filterwarnings =
    ignore::DeprecationWarning:importlib._bootstrap
markers =
    integration: needs live backend and/or LLM; run with: pytest -m integration
    emergent: graph step-count / thrashing checks (extra LLM time if telemetry on); run: pytest -m "integration and emergent"
    conversation: greeting / FAQ / product chit-chat scenarios
    ordering: cart and ordering scenarios
    payment: payment-flow scenarios
    cancellation: cancellation / refund scenarios
    security: prompt-injection and abuse-resistance scenarios
addopts = -q -m "not integration" --ignore=tests/manual_test.py
